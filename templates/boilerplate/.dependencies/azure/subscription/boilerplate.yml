variables:
  - name: SubscriptionName
    type: string
    description: The name of the first Azure subscription you are bootstrapping Pipelines in.
    order: 1

  - name: AzureTenantID
    type: string
    description: The Azure tenant ID for the tenant you are bootstrapping Pipelines in.
    order: 2

  - name: AzureSubscriptionID
    type: string
    description: The Azure subscription ID for the subscription you are bootstrapping Pipelines in.
    order: 3

  - name: CloudEnvironment
    type: string
    description: |
      The Azure cloud environment to target. Accepted values match the azurerm provider exactly
      (lowercase): "public", "usgovernment", "china", "german", "stack". Defaults to "public".
    default: "public"
    order: 4

  - name: StateResourceGroupName
    type: string
    description: The name of the Azure resource group to use for storing OpenTofu state.
    order: 5

  - name: StateStorageAccountName
    type: string
    description: The name of the Azure storage account to use for storing OpenTofu state.
    order: 6

  - name: StateStorageContainerName
    type: string
    description: The name of the Azure storage container to use for storing OpenTofu state.
    order: 7
