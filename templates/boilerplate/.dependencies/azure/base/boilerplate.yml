variables:
  - name: TerragruntVersion
    type: string
    description: The version of Terragrunt to use.
    default: "1.0.0"

  - name: OpenTofuVersion
    type: string
    description: The version of OpenTofu to use.
    default: "1.11.5"

  - name: AzureCLIVersion
    type: string
    description: The version of Azure CLI to use.
    default: "2.84.0"

  - name: PythonVersion
    type: string
    description: The version of Python to use.
    default: "3.14.3"

  - name: CloudEnvironment
    type: string
    description: |
      The Azure cloud environment to target. Accepted values match the azurerm provider exactly
      (lowercase): "public", "usgovernment", "china", "german", "stack". Defaults to "public".
    default: "public"
