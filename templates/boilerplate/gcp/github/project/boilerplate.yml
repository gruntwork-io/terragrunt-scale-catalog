dependencies:
  - name: gcp-project
    template-url: ../../../.dependencies/gcp/project
    output-folder: .

skip_files:
  - path: "README.md"
    if: "true"

variables:
  - name: ProjectName
    type: string
    description: The name of the GCP project you are bootstrapping Pipelines in.
    order: 1

  - name: GCPProjectID
    type: string
    description: The GCP project ID you are bootstrapping Pipelines in.
    order: 2

  - name: GCPProjectNumber
    type: string
    description: The GCP project number (numeric ID) for the project you are bootstrapping Pipelines in.
    order: 3

  - name: GitHubOrgName
    type: string
    description: The name of the GitHub organization you are bootstrapping Pipelines in.
    order: 4

  - name: GitHubRepoName
    type: string
    description: The name of the GitHub repository you are bootstrapping Pipelines in.
    order: 5

  - name: TerragruntScaleCatalogRef
    type: string
    description: The Git reference of the Terragrunt catalog to use.
    default: "v1.13.0"
    order: 6

  - name: OIDCResourcePrefix
    type: string
    description: The prefix for the OIDC resources you using to bootstrap Pipelines.
    default: "pipelines"
    order: 7

  - name: Issuer
    type: string
    description: The issuer URL for the OIDC provider (is computed dynamically from the SCM provider if not specified).
    default: ""
    order: 8

  - name: DeployBranch
    type: string
    description: The branch that is allowed to run apply operations.
    default: "main"
    order: 9

  - name: WorkloadIdentityPoolID
    type: string
    description: The ID of the Workload Identity Pool (computed from prefix if not specified).
    default: ""
    order: 10

  - name: WorkloadIdentityPoolProviderID
    type: string
    description: The ID of the Workload Identity Pool Provider (computed from prefix if not specified).
    default: ""
    order: 11

  - name: StateBucketName
    type: string
    description: The name of the GCS bucket used for Terraform state. When provided, the plan service account gets bucket-scoped object permissions for state locking instead of project-wide object access.
    order: 12

  - name: PlanRoles
    type: list
    description: The IAM roles to grant to the plan service account.
    default: []
    order: 13

  - name: ApplyRoles
    type: list
    description: The IAM roles to grant to the apply service account.
    default: []
    order: 14

  - name: WorkloadIdentityPoolImportExisting
    type: bool
    description: Whether to import an existing Workload Identity Pool.
    default: false
    order: 15

  - name: WorkloadIdentityPoolProviderImportExisting
    type: bool
    description: Whether to import an existing Workload Identity Pool Provider.
    default: false
    order: 16

  - name: PlanServiceAccountImportExisting
    type: bool
    description: Whether to import an existing plan service account.
    default: false
    order: 17

  - name: PlanWorkloadIdentityBindingImportExisting
    type: bool
    description: Whether to import an existing plan service account Workload Identity IAM binding.
    default: false
    order: 18

  - name: PlanStateBucketCustomRoleImportExisting
    type: bool
    description: Whether to import an existing plan state bucket custom IAM role.
    default: false
    order: 19

  - name: ApplyServiceAccountImportExisting
    type: bool
    description: Whether to import an existing apply service account.
    default: false
    order: 20

  - name: ApplyWorkloadIdentityBindingImportExisting
    type: bool
    description: Whether to import an existing apply service account Workload Identity IAM binding.
    default: false
    order: 21

  - name: PlanProjectIAMBindingsImportExisting
    type: bool
    description: Whether to import existing plan service account project IAM role bindings.
    default: false
    order: 22

  - name: ApplyProjectIAMBindingsImportExisting
    type: bool
    description: Whether to import existing apply service account project IAM role bindings.
    default: false
    order: 23

  - name: PlanStateBucketIAMBindingImportExisting
    type: bool
    description: Whether to import an existing plan service account state bucket IAM binding.
    default: false
    order: 24
